name: Deploy Dashboard
 
on:
  push:
    branches: [ main ]
 
permissions:
  contents: read
  pages: write
  id-token: write
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Generar config.js desde GitHub Secrets
        env:
          CAJAS_BIN_ID:          ${{ secrets.CAJAS_BIN_ID }}
          CAJAS_API_KEY:         ${{ secrets.CAJAS_API_KEY }}
          CAJAS_ADMIN_HASH:      ${{ secrets.CAJAS_ADMIN_HASH }}
          CAJAS_VIEW_HASH:       ${{ secrets.CAJAS_VIEW_HASH }}
          CAJAS_GCHAT_WEBHOOK:   ${{ secrets.CAJAS_GCHAT_WEBHOOK }}
          CAJAS_DASHBOARD_URL:   ${{ secrets.CAJAS_DASHBOARD_URL }}
        run: |
          python3 - << 'PYEOF'
          import os
          def s(k): return os.environ.get(k, '').strip()
          content = (
            "window.CAJAS_BIN_ID       = '{}';\n".format(s('CAJAS_BIN_ID')) +
            "window.CAJAS_API_KEY      = '{}';\n".format(s('CAJAS_API_KEY')) +
            "window.CAJAS_ADMIN_HASH   = '{}';\n".format(s('CAJAS_ADMIN_HASH')) +
            "window.CAJAS_VIEW_HASH    = '{}';\n".format(s('CAJAS_VIEW_HASH')) +
            "window.CAJAS_GCHAT_WEBHOOK= '{}';\n".format(s('CAJAS_GCHAT_WEBHOOK')) +
            "window.CAJAS_DASHBOARD_URL= '{}';\n".format(s('CAJAS_DASHBOARD_URL'))
          )
          with open('config.js', 'w') as f:
            f.write(content)
          print("config.js generado OK")
          PYEOF
 
      - name: Renombrar dashboard a index.html
        run: |
          if [ -f "cajas_dashboard.html" ]; then
            mv cajas_dashboard.html index.html
          fi
 
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
 
      - name: Subir archivos al sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
 
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
